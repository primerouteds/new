<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prime Route — Delivery Services UAE</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#D4AF37">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Prime Route">
  <link rel="apple-touch-icon" href="img/apple-touch-icon.png">

  <!-- SEO -->
  <meta name="description" content="Prime Route Delivery Services — Fast. Safe. On Time. Deliveries across the UAE.">

  <link rel="stylesheet" href="css/main.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #070B14;
      color: #fff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── NAV ── */
    .top-nav {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 12px;
      padding: 24px 40px;
      position: absolute;
      top: 0; right: 0;
      z-index: 10;
    }

    .btn-nav-ghost {
      background: transparent;
      border: 1px solid rgba(212,175,55,0.4);
      color: #D4AF37;
      padding: 9px 22px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      transition: background .2s, border-color .2s;
    }
    .btn-nav-ghost:hover { background: rgba(212,175,55,0.08); border-color: #D4AF37; }

    .btn-nav-primary {
      background: #D4AF37;
      border: 1px solid #D4AF37;
      color: #070B14;
      padding: 9px 22px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      transition: opacity .2s;
    }
    .btn-nav-primary:hover { opacity: .88; }

    /* ── HERO ── */
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 120px 24px 60px;
      position: relative;
    }

    /* subtle radial glow behind logo */
    .hero::before {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 600px; height: 400px;
      background: radial-gradient(ellipse at center, rgba(212,175,55,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-logo {
      width: min(480px, 88vw);
      margin-bottom: 28px;
      position: relative;
      z-index: 1;
    }

    .hero-uae {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: #D4AF37;
      margin-bottom: 40px;
      position: relative;
      z-index: 1;
    }
    .hero-uae::before, .hero-uae::after {
      content: '——';
      margin: 0 10px;
      opacity: .5;
    }

    /* ── TRACK BAR ── */
    .track-bar {
      display: flex;
      align-items: center;
      gap: 0;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(212,175,55,0.25);
      border-radius: 10px;
      overflow: hidden;
      width: min(520px, 92vw);
      margin-bottom: 48px;
      position: relative;
      z-index: 1;
    }
    .track-bar input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #fff;
      font-size: 14px;
      padding: 14px 18px;
    }
    .track-bar input::placeholder { color: rgba(255,255,255,0.3); }
    .track-bar button {
      background: #D4AF37;
      border: none;
      color: #070B14;
      font-weight: 700;
      font-size: 14px;
      padding: 14px 24px;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity .2s;
    }
    .track-bar button:hover { opacity: .88; }

    /* ── DIVIDER ── */
    .gold-line {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #D4AF37, transparent);
      margin: 0 auto 48px;
    }

    /* ── CONTACT ── */
    .contact-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 40px;
      flex-wrap: wrap;
      position: relative;
      z-index: 1;
    }
    .contact-item {
      display: flex;
      align-items: center;
      gap: 10px;
      color: rgba(255,255,255,0.65);
      font-size: 14px;
      text-decoration: none;
      transition: color .2s;
    }
    .contact-item:hover { color: #D4AF37; }
    .contact-icon {
      width: 34px; height: 34px;
      border-radius: 50%;
      border: 1px solid rgba(212,175,55,0.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 24px;
      color: rgba(255,255,255,0.2);
      font-size: 12px;
      letter-spacing: .04em;
    }

    /* ── PWA INSTALL BANNER ── */
    .install-banner {
      display: none;
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #111827;
      border: 1px solid rgba(212,175,55,0.4);
      border-radius: 14px;
      padding: 14px 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      align-items: center;
      gap: 14px;
      z-index: 100;
      width: min(420px, 92vw);
      animation: slideUp .3s ease;
    }
    .install-banner.visible { display: flex; }
    @keyframes slideUp {
      from { opacity: 0; transform: translateX(-50%) translateY(20px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    .install-banner img { width: 44px; height: 44px; border-radius: 10px; flex-shrink: 0; }
    .install-banner-text { flex: 1; }
    .install-banner-text strong { display: block; font-size: 14px; color: #fff; margin-bottom: 2px; }
    .install-banner-text span { font-size: 12px; color: rgba(255,255,255,0.5); }
    .install-banner-actions { display: flex; gap: 8px; flex-shrink: 0; }
    .btn-install {
      background: #D4AF37; color: #070B14; border: none;
      padding: 8px 16px; border-radius: 7px; font-size: 13px;
      font-weight: 700; cursor: pointer; white-space: nowrap;
      transition: opacity .2s;
    }
    .btn-install:hover { opacity: .88; }
    .btn-dismiss {
      background: transparent; color: rgba(255,255,255,0.4);
      border: none; font-size: 18px; cursor: pointer; line-height: 1;
      padding: 4px 6px;
    }
    .btn-dismiss:hover { color: #fff; }

    /* iOS tip */
    .ios-tip {
      display: none;
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #111827;
      border: 1px solid rgba(212,175,55,0.4);
      border-radius: 14px;
      padding: 14px 18px;
      font-size: 13px;
      color: rgba(255,255,255,0.75);
      text-align: center;
      line-height: 1.6;
      z-index: 100;
      width: min(320px, 92vw);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .ios-tip.visible { display: block; }
    .ios-tip strong { color: #D4AF37; }

    /* ── RESPONSIVE — tablet ── */
    @media (max-width: 768px) {
      .top-nav {
        padding: 16px 20px;
        gap: 8px;
      }
      .btn-nav-ghost, .btn-nav-primary {
        padding: 8px 16px;
        font-size: 13px;
      }
      .hero {
        padding: 100px 20px 48px;
        justify-content: flex-start;
        padding-top: 110px;
      }
      .hero-logo {
        width: min(380px, 90vw);
        margin-bottom: 20px;
      }
      .hero-uae {
        font-size: 11px;
        letter-spacing: .12em;
        margin-bottom: 28px;
      }
      .hero-uae::before, .hero-uae::after { content: '—'; margin: 0 6px; }
      .track-bar { margin-bottom: 36px; }
      .gold-line { margin-bottom: 36px; }
      .contact-row { gap: 20px; }
    }

    /* ── RESPONSIVE — mobile ── */
    @media (max-width: 480px) {
      .top-nav { padding: 14px 16px; }
      .btn-nav-ghost, .btn-nav-primary {
        padding: 7px 13px;
        font-size: 12px;
        border-radius: 5px;
      }
      .hero {
        padding: 90px 16px 40px;
        min-height: 100svh;
      }
      .hero-logo {
        width: 92vw;
        margin-bottom: 16px;
      }
      .hero::before {
        width: 300px; height: 200px;
      }
      .hero-uae {
        font-size: 10px;
        letter-spacing: .1em;
        margin-bottom: 24px;
      }
      .hero-uae::before, .hero-uae::after { display: none; }
      .track-bar {
        border-radius: 8px;
        margin-bottom: 28px;
      }
      .track-bar input {
        font-size: 13px;
        padding: 13px 14px;
      }
      .track-bar button {
        font-size: 13px;
        padding: 13px 16px;
      }
      .gold-line { margin-bottom: 28px; }
      .contact-row {
        flex-direction: column;
        gap: 14px;
        align-items: flex-start;
        padding: 0 8px;
      }
      .contact-item { font-size: 13px; }
      footer { padding: 20px 16px; font-size: 11px; }

      /* PWA banner full width on mobile */
      .install-banner {
        bottom: 12px;
        border-radius: 12px;
        padding: 12px 14px;
        gap: 10px;
      }
      .install-banner img { width: 36px; height: 36px; border-radius: 8px; }
      .install-banner-text strong { font-size: 13px; }
      .install-banner-text span { font-size: 11px; }
      .btn-install { padding: 7px 13px; font-size: 12px; }
    }
  </style>
</head>
<body>

<!-- Nav -->
<nav class="top-nav">
  <a href="tracking.html" class="btn-nav-ghost">Track Shipment</a>
  <a href="login.html" class="btn-nav-primary">Sign In</a>
</nav>

<!-- Hero -->
<section class="hero">
  <img src="img/logo-full.jpg" alt="Prime Route Delivery Services" class="hero-logo" />

  <div class="hero-uae">Deliveries across the UAE</div>

  <!-- Track input -->
  <div class="track-bar">
    <input type="text" id="trackInput" placeholder="Enter your tracking number…" />
    <button onclick="doTrack()">Track →</button>
  </div>

  <div class="gold-line"></div>

  <!-- Contact -->
  <div class="contact-row">
    <a href="mailto:info@primerouteds.ae" class="contact-item">
      <div class="contact-icon">✉</div>
      <span>info@primerouteds.ae</span>
    </a>
    <a href="tel:+971561225005" class="contact-item">
      <div class="contact-icon">📞</div>
      <span>+971 56 122 5005</span>
    </a>
  </div>
</section>

<!-- PWA Install Banner (Android / Desktop Chrome) -->
<div class="install-banner" id="installBanner">
  <img src="img/icon-192.png" alt="Prime Route icon">
  <div class="install-banner-text">
    <strong>Install Prime Route</strong>
    <span>Add to your home screen for quick access</span>
  </div>
  <div class="install-banner-actions">
    <button class="btn-install" id="installBtn">Install</button>
    <button class="btn-dismiss" id="dismissBtn" title="Dismiss">✕</button>
  </div>
</div>

<!-- iOS tip (shown once on Safari/iPhone) -->
<div class="ios-tip" id="iosTip">
  Tap <strong>Share ↑</strong> then <strong>"Add to Home Screen"</strong><br>to install Prime Route on your iPhone.
  <br><br><button class="btn-dismiss" id="iosDismiss" style="display:inline;font-size:13px;color:#D4AF37">Got it</button>
</div>

<footer>© 2025 Prime Route Delivery Services. All rights reserved.</footer>

<script>
  function doTrack() {
    const val = document.getElementById('trackInput').value.trim();
    if (!val) return;
    window.location.href = 'tracking.html?t=' + encodeURIComponent(val);
  }
  document.getElementById('trackInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') doTrack();
  });

  // ── Service Worker ──
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    });
  }

  // ── PWA Install ──
  let deferredPrompt = null;
  const banner   = document.getElementById('installBanner');
  const iosTip   = document.getElementById('iosTip');

  // Android / Desktop Chrome
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    if (!localStorage.getItem('pwa-dismissed')) {
      banner.classList.add('visible');
    }
  });

  document.getElementById('installBtn').addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    deferredPrompt = null;
    banner.classList.remove('visible');
  });

  document.getElementById('dismissBtn').addEventListener('click', () => {
    banner.classList.remove('visible');
    localStorage.setItem('pwa-dismissed', '1');
  });

  // iOS Safari — show tip once
  const isIos = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isInStandaloneMode = ('standalone' in navigator) && navigator.standalone;
  if (isIos && !isInStandaloneMode && !localStorage.getItem('ios-tip-dismissed')) {
    setTimeout(() => iosTip.classList.add('visible'), 1500);
  }

  document.getElementById('iosDismiss').addEventListener('click', () => {
    iosTip.classList.remove('visible');
    localStorage.setItem('ios-tip-dismissed', '1');
  });
</script>
</body>
</html>
