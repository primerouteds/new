<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prime Route — Delivery Services UAE</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #070B14;
      color: #fff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── NAV ── */
    .top-nav {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 12px;
      padding: 24px 40px;
      position: absolute;
      top: 0; right: 0;
      z-index: 10;
    }

    .btn-nav-ghost {
      background: transparent;
      border: 1px solid rgba(212,175,55,0.4);
      color: #D4AF37;
      padding: 9px 22px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      transition: background .2s, border-color .2s;
    }
    .btn-nav-ghost:hover { background: rgba(212,175,55,0.08); border-color: #D4AF37; }

    .btn-nav-primary {
      background: #D4AF37;
      border: 1px solid #D4AF37;
      color: #070B14;
      padding: 9px 22px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      transition: opacity .2s;
    }
    .btn-nav-primary:hover { opacity: .88; }

    /* ── HERO ── */
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 120px 24px 60px;
      position: relative;
    }

    /* subtle radial glow behind logo */
    .hero::before {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 600px; height: 400px;
      background: radial-gradient(ellipse at center, rgba(212,175,55,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-logo {
      width: min(480px, 88vw);
      margin-bottom: 28px;
      position: relative;
      z-index: 1;
    }

    .hero-uae {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: #D4AF37;
      margin-bottom: 40px;
      position: relative;
      z-index: 1;
    }
    .hero-uae::before, .hero-uae::after {
      content: '——';
      margin: 0 10px;
      opacity: .5;
    }

    /* ── TRACK BAR ── */
    .track-bar {
      display: flex;
      align-items: center;
      gap: 0;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(212,175,55,0.25);
      border-radius: 10px;
      overflow: hidden;
      width: min(520px, 92vw);
      margin-bottom: 48px;
      position: relative;
      z-index: 1;
    }
    .track-bar input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #fff;
      font-size: 14px;
      padding: 14px 18px;
    }
    .track-bar input::placeholder { color: rgba(255,255,255,0.3); }
    .track-bar button {
      background: #D4AF37;
      border: none;
      color: #070B14;
      font-weight: 700;
      font-size: 14px;
      padding: 14px 24px;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity .2s;
    }
    .track-bar button:hover { opacity: .88; }

    /* ── DIVIDER ── */
    .gold-line {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #D4AF37, transparent);
      margin: 0 auto 48px;
    }

    /* ── CONTACT ── */
    .contact-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 40px;
      flex-wrap: wrap;
      position: relative;
      z-index: 1;
    }
    .contact-item {
      display: flex;
      align-items: center;
      gap: 10px;
      color: rgba(255,255,255,0.65);
      font-size: 14px;
      text-decoration: none;
      transition: color .2s;
    }
    .contact-item:hover { color: #D4AF37; }
    .contact-icon {
      width: 34px; height: 34px;
      border-radius: 50%;
      border: 1px solid rgba(212,175,55,0.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 24px;
      color: rgba(255,255,255,0.2);
      font-size: 12px;
      letter-spacing: .04em;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 480px) {
      .top-nav { padding: 16px 20px; }
      .contact-row { gap: 20px; }
    }
  </style>
</head>
<body>

<!-- Nav -->
<nav class="top-nav">
  <a href="tracking.html" class="btn-nav-ghost">Track Shipment</a>
  <a href="login.html" class="btn-nav-primary">Sign In</a>
</nav>

<!-- Hero -->
<section class="hero">
  <img src="img/logo-full.jpg" alt="Prime Route Delivery Services" class="hero-logo" />

  <div class="hero-uae">Deliveries across the UAE</div>

  <!-- Track input -->
  <div class="track-bar">
    <input type="text" id="trackInput" placeholder="Enter your tracking number…" />
    <button onclick="doTrack()">Track →</button>
  </div>

  <div class="gold-line"></div>

  <!-- Contact -->
  <div class="contact-row">
    <a href="mailto:info@primeroute.ae" class="contact-item">
      <div class="contact-icon">✉</div>
      <span>info@primeroute.ae</span>
    </a>
    <a href="tel:+971561225005" class="contact-item">
      <div class="contact-icon">📞</div>
      <span>+971 56 122 5005</span>
    </a>
  </div>
</section>

<footer>© 2025 Prime Route Delivery Services. All rights reserved.</footer>

<script>
  function doTrack() {
    const val = document.getElementById('trackInput').value.trim();
    if (!val) return;
    window.location.href = 'tracking.html?t=' + encodeURIComponent(val);
  }
  document.getElementById('trackInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') doTrack();
  });
</script>
</body>
</html>
